<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Waypoint{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --accent: #6c8ef5;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --muted: #7a8299;
      --border: #2d3148;
      --success: #4ade80;
      --radius: 12px;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }
    nav a:hover { color: var(--text); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.4rem; }
    h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem; }
    p.subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  </style>
  {% block extra_styles %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="logo">✦ Waypoint</a>
    <a href="/">Discover</a>
    <a href="/compare/start">Compare</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
